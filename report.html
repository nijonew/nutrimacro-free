<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Reports</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#1C2530">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./style.css">
<style>

  .day-block { margin-bottom: 18px; }
  .day-block:last-child { margin-bottom: 0; }

  .day-block h3 {
    font-family: 'Manrope', sans-serif;
    font-size: 14px;
    font-weight: 800;
    margin: 0 0 6px;
  }

  .report-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
    margin-bottom: 6px;
  }

  .report-table th, .report-table td {
    text-align: left;
    padding: 6px 8px;
    border-bottom: 1px solid var(--line);
  }

  .report-table th {
    color: var(--ink-soft);
    font-weight: 700;
    font-size: 11px;
    text-transform: uppercase;
  }

  .report-table tr.total-row td {
    font-weight: 700;
    border-top: 2px solid var(--line);
  }

  .report-table tr.percent-row td {
    color: var(--ink-soft);
    font-style: italic;
  }

  .averages-box {
    margin-top: 10px;
  }

</style>
</head>
<body>

<header>
  <div class="titles">
    <div class="eyebrow">Overview</div>
    <h1>Reports</h1>
  </div>
  <a class="back" href="./index.html">&larr; Home</a>
</header>

<main>

  <div class="card">
    <h2>Date range</h2>
    <div class="row-2">
      <div>
        <label for="startDateInput">Start</label>
        <input type="date" id="startDateInput">
      </div>
      <div>
        <label for="endDateInput">End</label>
        <input type="date" id="endDateInput">
      </div>
    </div>

    <label>Include</label>
    <div class="segmented">
      <button class="active" id="typeNutritionBtn" onclick="setReportType('nutrition')">Nutrition</button>
      <button id="typeWorkoutBtn" onclick="setReportType('workout')">Workouts</button>
      <button id="typeBothBtn" onclick="setReportType('both')">Both</button>
    </div>

    <label id="detailLevelLabel">Nutrition detail level</label>
    <div class="segmented" id="detailLevelToggle">
      <button class="active" id="detailFullBtn" onclick="setDetailLevel('full')">Full Detail</button>
      <button id="detailSummaryBtn" onclick="setDetailLevel('summary')">Daily Totals Only</button>
    </div>

    <button onclick="generateReport()">Generate Report</button>
    <div class="result-box" id="statusBox"></div>
  </div>

  <div class="card" id="resultsCard" style="display:none;">
    <h2>Results</h2>
    <button class="secondary" id="downloadBtn" style="margin-bottom:14px;" onclick="downloadPdf()">Download PDF</button>
    <div id="resultsArea"></div>
  </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./calc.js"></script>
<script src="./app.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script>

let reportType = "nutrition";
let detailLevel = "full";
let lastReport = null; // { startDate, endDate, reportType, detailLevel, nutritionDays, workoutDays }

window.addEventListener("load", async function() {

  const session = await requireAuth();
  if (!session) return;

  registerServiceWorker();

  const today = new Date();
  const weekAgo = new Date();
  weekAgo.setDate(weekAgo.getDate() - 6);

  document.getElementById("endDateInput").value = localDateString(today);
  document.getElementById("startDateInput").value = localDateString(weekAgo);

});

function setReportType(type) {
  reportType = type;
  document.getElementById("typeNutritionBtn").classList.toggle("active", type === "nutrition");
  document.getElementById("typeWorkoutBtn").classList.toggle("active", type === "workout");
  document.getElementById("typeBothBtn").classList.toggle("active", type === "both");
  document.getElementById("detailLevelToggle").style.display = (type === "workout") ? "none" : "flex";
  document.getElementById("detailLevelLabel").style.display = (type === "workout") ? "none" : "block";
}

function setDetailLevel(level) {
  detailLevel = level;
  document.getElementById("detailFullBtn").classList.toggle("active", level === "full");
  document.getElementById("detailSummaryBtn").classList.toggle("active", level === "summary");
}

function dateRange(startStr, endStr) {
  const dates = [];
  let cursor = new Date(startStr + "T00:00:00");
  const end = new Date(endStr + "T00:00:00");
  while (cursor <= end) {
    dates.push(localDateString(cursor));
    cursor.setDate(cursor.getDate() + 1);
  }
  return dates;
}

async function generateReport() {

  const startDate = document.getElementById("startDateInput").value;
  const endDate = document.getElementById("endDateInput").value;

  if (!startDate || !endDate) { showStatus(false, "Choose a start and end date."); return; }
  if (startDate > endDate) { showStatus(false, "Start date must be before end date."); return; }

  showStatus(true, "Building report...");

  const dates = dateRange(startDate, endDate);
  const nutritionDays = [];
  const workoutDays = [];

  for (const date of dates) {

    if (reportType === "nutrition" || reportType === "both") {
      const json = await apiGet("getDailyLogEntries", { date: date });
      if (json.success && json.data.entries.length > 0) {
        nutritionDays.push({ date: date, entries: json.data.entries, totals: json.data.totals });
      }
    }

    if (reportType === "workout" || reportType === "both") {
      const json = await apiGet("getWorkoutEntries", { date: date });
      if (json.success && json.data.entries.length > 0) {
        workoutDays.push({ date: date, entries: json.data.entries });
      }
    }

  }

  lastReport = { startDate: startDate, endDate: endDate, reportType: reportType, detailLevel: detailLevel, nutritionDays: nutritionDays, workoutDays: workoutDays };

  renderReport(lastReport);
  showStatus(true, "Report ready.");

}

function computeAverages(nutritionDays) {
  const sums = { calories: 0, protein: 0, carbs: 0, fat: 0, fiber: 0, netCarbs: 0 };
  nutritionDays.forEach(function(day) {
    sums.calories += Number(day.totals.calories) || 0;
    sums.protein += Number(day.totals.protein) || 0;
    sums.carbs += Number(day.totals.carbs) || 0;
    sums.fat += Number(day.totals.fat) || 0;
  });
  const count = nutritionDays.length || 1;
  return {
    calories: round2(sums.calories / count),
    protein: round2(sums.protein / count),
    carbs: round2(sums.carbs / count),
    fat: round2(sums.fat / count)
  };
}

// ============================================================
// SCREEN RENDERING
// ============================================================

function renderReport(report) {

  document.getElementById("resultsCard").style.display = "block";
  const area = document.getElementById("resultsArea");
  let html = "";

  if (report.reportType === "nutrition" || report.reportType === "both") {

    if (report.nutritionDays.length === 0) {
      html += "<div class='empty-state'>No nutrition entries logged in this date range.</div>";
    } else if (report.detailLevel === "full") {
      html += renderFullDetailNutrition(report.nutritionDays);
    } else {
      html += renderSummaryNutrition(report.nutritionDays);
    }

    if (report.nutritionDays.length > 0) {
      html += renderAveragesTable(report.nutritionDays);
    }

  }

  if (report.reportType === "workout" || report.reportType === "both") {

    html += "<h2 style='margin-top:20px;'>Workouts</h2>";

    if (report.workoutDays.length === 0) {
      html += "<div class='empty-state'>No workouts logged in this date range.</div>";
    } else {
      report.workoutDays.forEach(function(day) {
        const rows = day.entries.map(function(e) {
          return "<tr><td>" + escapeHtml(e.exercise) + "</td><td>" + e.setNumber + "</td><td>" +
            formatAmountForDisplay(e.weight) + e.unit + "</td><td>" + e.reps + "</td><td>" + escapeHtml(e.notes || "") + "</td></tr>";
        }).join("");
        html += "<div class='day-block'>" +
          "<h3>" + day.date + "</h3>" +
          "<table class='report-table'><thead><tr><th>Exercise</th><th>Set</th><th>Weight</th><th>Reps</th><th>Notes</th></tr></thead>" +
          "<tbody>" + rows + "</tbody></table>" +
        "</div>";
      });
    }

  }

  area.innerHTML = html;

}

function renderFullDetailNutrition(nutritionDays) {

  return nutritionDays.map(function(day) {

    const itemRows = day.entries.map(function(e) {
      return "<tr><td>" + escapeHtml(e.meal) + "</td><td>" + escapeHtml(e.name) + "</td><td>" +
        formatAmountForDisplay(e.amount) + " " + escapeHtml(e.unit) + "</td><td>" + formatAmountForDisplay(e.calories) +
        "</td><td>" + formatAmountForDisplay(e.protein) + "</td><td>" + formatAmountForDisplay(e.carbs) + "</td><td>" + formatAmountForDisplay(e.fat) + "</td></tr>";
    }).join("");

    const pct = calculateMacroPercents(day.totals);

    const totalRow = "<tr class='total-row'><td></td><td>Day Total</td><td></td><td>" +
      formatAmountForDisplay(day.totals.calories) + "</td><td>" + formatAmountForDisplay(day.totals.protein) +
      "</td><td>" + formatAmountForDisplay(day.totals.carbs) + "</td><td>" + formatAmountForDisplay(day.totals.fat) + "</td></tr>";

    const percentRow = "<tr class='percent-row'><td></td><td>% of Calories</td><td></td><td></td><td>" +
      pct.protein + "%</td><td>" + pct.carbs + "%</td><td>" + pct.fat + "%</td></tr>";

    return "<div class='day-block'>" +
      "<h3>" + day.date + "</h3>" +
      "<table class='report-table'><thead><tr><th>Meal</th><th>Item</th><th>Amount</th><th>Cal</th><th>Prot</th><th>Carb</th><th>Fat</th></tr></thead>" +
      "<tbody>" + itemRows + totalRow + percentRow + "</tbody></table>" +
    "</div>";

  }).join("");

}

function renderSummaryNutrition(nutritionDays) {

  const rows = nutritionDays.map(function(day) {
    const pct = calculateMacroPercents(day.totals);
    return "<tr><td>" + day.date + "</td><td>" + formatAmountForDisplay(day.totals.calories) + "</td><td>" +
      formatAmountForDisplay(day.totals.protein) + "</td><td>" + formatAmountForDisplay(day.totals.carbs) + "</td><td>" +
      formatAmountForDisplay(day.totals.fat) + "</td><td>" + pct.protein + "%</td><td>" + pct.carbs + "%</td><td>" + pct.fat + "%</td></tr>";
  }).join("");

  return "<div class='day-block'>" +
    "<table class='report-table'><thead><tr><th>Date</th><th>Cal</th><th>Prot</th><th>Carb</th><th>Fat</th><th>%P</th><th>%C</th><th>%F</th></tr></thead>" +
    "<tbody>" + rows + "</tbody></table>" +
  "</div>";

}

function renderAveragesTable(nutritionDays) {

  const avg = computeAverages(nutritionDays);
  const pct = calculateMacroPercents(avg);

  const avgRow = "<tr class='total-row'><td>Average</td><td>" + formatAmountForDisplay(avg.calories) + "</td><td>" +
    formatAmountForDisplay(avg.protein) + "</td><td>" + formatAmountForDisplay(avg.carbs) + "</td><td>" + formatAmountForDisplay(avg.fat) + "</td></tr>";

  const pctRow = "<tr class='percent-row'><td>Average % of Calories</td><td></td><td>" +
    pct.protein + "%</td><td>" + pct.carbs + "%</td><td>" + pct.fat + "%</td></tr>";

  return "<div class='averages-box'>" +
    "<h3 style=\"font-family:'Manrope',sans-serif; font-size:14px; font-weight:800; margin:0 0 6px;\">Period Averages (" + nutritionDays.length + " logged day" + (nutritionDays.length === 1 ? "" : "s") + ")</h3>" +
    "<table class='report-table'><thead><tr><th></th><th>Cal</th><th>Prot</th><th>Carb</th><th>Fat</th></tr></thead>" +
    "<tbody>" + avgRow + pctRow + "</tbody></table>" +
  "</div>";

}

// ============================================================
// PDF GENERATION
// ============================================================

function downloadPdf() {

  if (!lastReport) return;

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  doc.setFontSize(18);
  doc.text("Nutrition & Workout Report", 14, 18);
  doc.setFontSize(11);
  doc.setTextColor(100);
  doc.text(lastReport.startDate + " to " + lastReport.endDate, 14, 25);

  let y = 34;

  if (lastReport.reportType === "nutrition" || lastReport.reportType === "both") {

    doc.setFontSize(14);
    doc.setTextColor(0);
    doc.text("Nutrition", 14, y);
    y += 6;

    if (lastReport.nutritionDays.length === 0) {
      doc.setFontSize(11);
      doc.text("No nutrition entries logged in this date range.", 14, y);
      y += 8;
    } else if (lastReport.detailLevel === "full") {
      y = pdfFullDetailNutrition(doc, lastReport.nutritionDays, y);
    } else {
      y = pdfSummaryNutrition(doc, lastReport.nutritionDays, y);
    }

    if (lastReport.nutritionDays.length > 0) {
      y = pdfAveragesTable(doc, lastReport.nutritionDays, y);
    }

  }

  if (lastReport.reportType === "workout" || lastReport.reportType === "both") {

    if (y > 250) { doc.addPage(); y = 18; }

    doc.setFontSize(14);
    doc.text("Workouts", 14, y);
    y += 6;

    if (lastReport.workoutDays.length === 0) {
      doc.setFontSize(11);
      doc.text("No workouts logged in this date range.", 14, y);
    } else {
      lastReport.workoutDays.forEach(function(day) {
        doc.setFontSize(12);
        doc.text(day.date, 14, y);
        y += 4;
        const body = day.entries.map(function(e) {
          return [e.exercise, e.setNumber, formatAmountForDisplay(e.weight) + e.unit, e.reps, e.notes || ""];
        });
        doc.autoTable({ startY: y, head: [["Exercise", "Set", "Weight", "Reps", "Notes"]], body: body, styles: { fontSize: 8 }, margin: { left: 14, right: 14 } });
        y = doc.lastAutoTable.finalY + 10;
        if (y > 260) { doc.addPage(); y = 18; }
      });
    }

  }

  doc.save("Report-" + lastReport.startDate + "-to-" + lastReport.endDate + ".pdf");

}

function pdfFullDetailNutrition(doc, nutritionDays, y) {

  nutritionDays.forEach(function(day) {

    doc.setFontSize(12);
    doc.text(day.date, 14, y);
    y += 4;

    const itemBody = day.entries.map(function(e) {
      return [e.meal, e.name, formatAmountForDisplay(e.amount) + " " + e.unit, formatAmountForDisplay(e.calories), formatAmountForDisplay(e.protein), formatAmountForDisplay(e.carbs), formatAmountForDisplay(e.fat)];
    });

    const pct = calculateMacroPercents(day.totals);
    itemBody.push([
      { content: "Day Total", styles: { fontStyle: "bold" } }, "", "",
      { content: formatAmountForDisplay(day.totals.calories), styles: { fontStyle: "bold" } },
      { content: formatAmountForDisplay(day.totals.protein), styles: { fontStyle: "bold" } },
      { content: formatAmountForDisplay(day.totals.carbs), styles: { fontStyle: "bold" } },
      { content: formatAmountForDisplay(day.totals.fat), styles: { fontStyle: "bold" } }
    ]);
    itemBody.push([
      { content: "% of Calories", styles: { fontStyle: "italic" } }, "", "", "",
      pct.protein + "%", pct.carbs + "%", pct.fat + "%"
    ]);

    doc.autoTable({
      startY: y,
      head: [["Meal", "Item", "Amount", "Cal", "Prot", "Carb", "Fat"]],
      body: itemBody,
      styles: { fontSize: 8 },
      margin: { left: 14, right: 14 }
    });

    y = doc.lastAutoTable.finalY + 10;
    if (y > 260) { doc.addPage(); y = 18; }

  });

  return y;

}

function pdfSummaryNutrition(doc, nutritionDays, y) {

  const body = nutritionDays.map(function(day) {
    const pct = calculateMacroPercents(day.totals);
    return [day.date, formatAmountForDisplay(day.totals.calories), formatAmountForDisplay(day.totals.protein),
      formatAmountForDisplay(day.totals.carbs), formatAmountForDisplay(day.totals.fat), pct.protein + "%", pct.carbs + "%", pct.fat + "%"];
  });

  doc.autoTable({
    startY: y,
    head: [["Date", "Cal", "Prot", "Carb", "Fat", "%P", "%C", "%F"]],
    body: body,
    styles: { fontSize: 8 },
    margin: { left: 14, right: 14 }
  });

  return doc.lastAutoTable.finalY + 10;

}

function pdfAveragesTable(doc, nutritionDays, y) {

  if (y > 250) { doc.addPage(); y = 18; }

  const avg = computeAverages(nutritionDays);
  const pct = calculateMacroPercents(avg);

  doc.setFontSize(12);
  doc.setTextColor(0);
  doc.text("Period Averages (" + nutritionDays.length + " logged day" + (nutritionDays.length === 1 ? "" : "s") + ")", 14, y);
  y += 4;

  const body = [
    [
      { content: "Average", styles: { fontStyle: "bold" } },
      { content: formatAmountForDisplay(avg.calories), styles: { fontStyle: "bold" } },
      { content: formatAmountForDisplay(avg.protein), styles: { fontStyle: "bold" } },
      { content: formatAmountForDisplay(avg.carbs), styles: { fontStyle: "bold" } },
      { content: formatAmountForDisplay(avg.fat), styles: { fontStyle: "bold" } }
    ],
    [
      { content: "Average % of Calories", styles: { fontStyle: "italic" } },
      "", pct.protein + "%", pct.carbs + "%", pct.fat + "%"
    ]
  ];

  doc.autoTable({
    startY: y,
    head: [["", "Cal", "Prot", "Carb", "Fat"]],
    body: body,
    styles: { fontSize: 8 },
    margin: { left: 14, right: 14 }
  });

  return doc.lastAutoTable.finalY + 12;

}

function showStatus(ok, message) {
  const box = document.getElementById("statusBox");
  box.className = "result-box " + (ok ? "ok" : "error");
  box.textContent = message;
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = String(str);
  return div.innerHTML;
}

</script>

</body>
</html>
