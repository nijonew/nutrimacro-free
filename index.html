<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Nutrition Tracker</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#1C2530">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./style.css">
<style>

  .quick-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .quick-link {
    display: block;
    background: var(--bg);
    border-radius: 10px;
    padding: 16px 12px;
    text-align: center;
    text-decoration: none;
    color: var(--ink);
    font-family: 'Manrope', sans-serif;
    font-weight: 700;
    font-size: 14px;
  }

  .quick-link:active { opacity: 0.75; }

  .auth-toggle-link {
    display: block;
    text-align: center;
    margin-top: 14px;
    font-size: 13px;
    color: var(--ink-soft);
  }

  .auth-toggle-link a {
    color: var(--accent);
    font-weight: 700;
    text-decoration: none;
  }

  .forgot-link {
    display: block;
    text-align: center;
    margin-top: 10px;
    font-size: 12px;
    color: var(--ink-soft);
    text-decoration: none;
  }

</style>
</head>
<body>

<header>
  <div class="titles">
    <div class="eyebrow">Nutrition Tracker</div>
    <h1 id="headerTitle">Welcome</h1>
  </div>
</header>

<main>

  <!-- ============ LOGIN / SIGNUP (shown when not signed in) ============ -->
  <div class="card" id="authCard" style="display:none;">

    <h2 id="authHeading">Sign In</h2>

    <label for="emailInput">Email</label>
    <input type="text" id="emailInput" placeholder="you@example.com" autocomplete="username">

    <label for="passwordInput">Password</label>
    <input type="password" id="passwordInput" placeholder="••••••••" autocomplete="current-password">

    <button id="authSubmitBtn" onclick="submitAuth()">Sign In</button>
    <div class="result-box" id="authResultBox"></div>

    <div class="auth-toggle-link" id="authToggleText">
      Don't have an account? <a onclick="setAuthMode('signup')">Create one</a>
    </div>

    <a class="forgot-link" id="forgotLink" onclick="forgotPassword()">Forgot your password?</a>

  </div>

  <!-- ============ DASHBOARD (shown when signed in) ============ -->
  <div id="dashboardArea" style="display:none;">

    <div class="card">
      <h2>Quick actions</h2>
      <div class="quick-grid">
        <a class="quick-link" href="./log.html">Log Food</a>
        <a class="quick-link" href="./today.html">Today</a>
        <a class="quick-link" href="./recipe.html">Build a Recipe</a>
        <a class="quick-link" href="./workout.html">Log Workout</a>
        <a class="quick-link" href="./add-food.html">Add Food</a>
        <a class="quick-link" href="./workout-history.html">Workout History</a>
        <a class="quick-link" href="./progress.html">Log Progress</a>
        <a class="quick-link" href="./achievements.html">Achievements</a>
      </div>
    </div>

    <div class="card">
      <button class="secondary" onclick="handleLogOut()">Sign Out</button>
    </div>

  </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./calc.js"></script>
<script src="./app.js"></script>
<script>

let authMode = "login"; // "login" or "signup"

window.addEventListener("load", async function() {

  registerServiceWorker();

  const { data } = await sb.auth.getSession();

  if (data.session) {
    showDashboard();
  } else {
    showAuthForm();
  }

});

function showDashboard() {
  document.getElementById("headerTitle").textContent = "Home";
  document.getElementById("authCard").style.display = "none";
  document.getElementById("dashboardArea").style.display = "block";
}

function showAuthForm() {
  document.getElementById("headerTitle").textContent = "Welcome";
  document.getElementById("authCard").style.display = "block";
  document.getElementById("dashboardArea").style.display = "none";
}

function setAuthMode(mode) {

  authMode = mode;
  const heading = document.getElementById("authHeading");
  const submitBtn = document.getElementById("authSubmitBtn");
  const toggleText = document.getElementById("authToggleText");
  const forgotLink = document.getElementById("forgotLink");

  if (mode === "signup") {
    heading.textContent = "Create Account";
    submitBtn.textContent = "Create Account";
    toggleText.innerHTML = "Already have an account? <a onclick=\"setAuthMode('login')\">Sign in</a>";
    forgotLink.style.display = "none";
  } else {
    heading.textContent = "Sign In";
    submitBtn.textContent = "Sign In";
    toggleText.innerHTML = "Don't have an account? <a onclick=\"setAuthMode('signup')\">Create one</a>";
    forgotLink.style.display = "block";
  }

  document.getElementById("authResultBox").className = "result-box";
  document.getElementById("authResultBox").textContent = "";

}

function submitAuth() {

  const email = document.getElementById("emailInput").value.trim();
  const password = document.getElementById("passwordInput").value;

  if (!email) { showAuthResult(false, "Enter your email."); return; }
  if (!password || password.length < 6) { showAuthResult(false, "Password must be at least 6 characters."); return; }

  showAuthResult(true, authMode === "signup" ? "Creating account..." : "Signing in...");

  const action = (authMode === "signup") ? signUp(email, password) : logIn(email, password);

  action.then(function() {

    if (authMode === "signup") {
      showAuthResult(true, "Account created. Check your email if confirmation is required, otherwise you're signed in.");
    }

    showDashboard();

  }).catch(function(err) {
    showAuthResult(false, err.message);
  });

}

function forgotPassword() {

  const email = document.getElementById("emailInput").value.trim();
  if (!email) { showAuthResult(false, "Enter your email above first, then tap this link again."); return; }

  sendPasswordReset(email).then(function() {
    showAuthResult(true, "Password reset email sent to " + email + ".");
  }).catch(function(err) {
    showAuthResult(false, err.message);
  });

}

function handleLogOut() {
  logOut().then(function() {
    showAuthForm();
  });
}

function showAuthResult(ok, message) {
  const box = document.getElementById("authResultBox");
  box.className = "result-box " + (ok ? "ok" : "error");
  box.textContent = message;
}

</script>

</body>
</html>
