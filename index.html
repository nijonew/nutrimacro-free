<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Nutrition Tracker</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#1C2530">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./style.css">
<style>

  .totals-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
  }

  .total-tile {
    background: var(--bg);
    border-radius: 10px;
    padding: 12px 10px;
    text-align: center;
  }

  .total-tile .value {
    font-family: 'Manrope', sans-serif;
    font-size: 20px;
    font-weight: 800;
  }

  .total-tile .label {
    font-size: 11px;
    color: var(--ink-soft);
    margin-top: 2px;
  }

  .total-tile.protein .value { color: var(--protein); }
  .total-tile.carbs .value { color: var(--carbs); }
  .total-tile.fat .value { color: var(--fat); }

  .nav-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .nav-grid button { font-size: 13px; padding: 12px 10px; }

  .gear {
    text-decoration: none;
    color: var(--ink-soft);
    font-size: 20px;
    padding: 4px;
  }

</style>
</head>
<body>

<header>
  <div class="titles">
    <div class="eyebrow" id="dateLabel">Today</div>
    <h1>Nutrition Tracker</h1>
  </div>
  <a class="gear" href="./settings.html" title="Settings">&#9881;</a>
</header>

<main>

  <div class="card" id="notConfiguredCard" style="display:none;">
    <h2>Get started</h2>
    <div class="helper">Connect to your backend to begin.</div>
    <a href="./settings.html" style="text-decoration:none;">
      <button>Go to Settings</button>
    </a>
  </div>

  <div id="mainContent" style="display:none;">

    <div class="card">
      <h2>Today so far</h2>
      <div class="totals-grid">
        <div class="total-tile">
          <div class="value" id="totalCalories">–</div>
          <div class="label">Calories</div>
        </div>
        <div class="total-tile protein">
          <div class="value" id="totalProtein">–</div>
          <div class="label">Protein (g)</div>
        </div>
        <div class="total-tile carbs">
          <div class="value" id="totalCarbs">–</div>
          <div class="label">Carbs (g)</div>
        </div>
        <div class="total-tile fat">
          <div class="value" id="totalFat">–</div>
          <div class="label">Fat (g)</div>
        </div>
        <div class="total-tile">
          <div class="value" id="totalFiber">–</div>
          <div class="label">Fiber (g)</div>
        </div>
        <div class="total-tile">
          <div class="value" id="totalNetCarbs">–</div>
          <div class="label">Net Carbs (g)</div>
        </div>
      </div>
      <div style="height:12px;"></div>
      <a href="./today.html" style="text-decoration:none;">
        <button class="secondary">View Full Day</button>
      </a>
    </div>

    <div class="card">
      <h2>Quick actions</h2>
      <div class="nav-grid">
        <a href="./log.html" style="text-decoration:none;"><button>Log Food/Recipe</button></a>
        <a href="./recipe.html" style="text-decoration:none;"><button class="secondary">Build a Recipe</button></a>
        <a href="./add-food.html" style="text-decoration:none;"><button class="secondary">Add Food Manually</button></a>
        <a href="./edit-food.html" style="text-decoration:none;"><button class="secondary">Edit a Food</button></a>
      </div>
    </div>

    <div class="card">
      <h2>Workouts</h2>
      <div class="nav-grid">
        <a href="./workout.html" style="text-decoration:none;"><button>Log Workout</button></a>
        <a href="./workout-history.html" style="text-decoration:none;"><button class="secondary">Workout History</button></a>
        <a href="./workout-templates.html" style="text-decoration:none;"><button class="secondary">Build a Template</button></a>
      </div>
    </div>

  </div>

</main>

<script src="./app.js"></script>
<script>

window.addEventListener("load", function() {

  registerServiceWorker();

  if (!isConfigured()) {
    document.getElementById("notConfiguredCard").style.display = "block";
    return;
  }

  document.getElementById("mainContent").style.display = "block";
  loadToday();

});

function loadToday() {

  const today = new Date().toISOString().slice(0, 10);

  apiGet("getDailyLogEntries", { date: today }).then(function(json) {
    if (json.success) {
      setTotals(json.data.totals);
    }
  }).catch(function(err) {
    console.log("Could not load today's totals:", err.message);
  });

}

function setTotals(totals) {
  document.getElementById("totalCalories").textContent = totals.calories;
  document.getElementById("totalProtein").textContent = totals.protein;
  document.getElementById("totalCarbs").textContent = totals.carbs;
  document.getElementById("totalFat").textContent = totals.fat;
  document.getElementById("totalFiber").textContent = totals.fiber;
  document.getElementById("totalNetCarbs").textContent = totals.netCarbs;
}

</script>

</body>
</html>
