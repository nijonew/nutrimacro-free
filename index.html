<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Nutrition Tracker</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#1C2530">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

  :root {
    --bg: #F3F5F7;
    --surface: #FFFFFF;
    --ink: #1C2530;
    --ink-soft: #5B6672;
    --line: #E1E6EB;
    --accent: #E2A33D;
    --accent-ink: #4A3210;
    --protein: #2A7F72;
    --carbs: #C98A2E;
    --fat: #8B5A83;
    --error: #B3452F;
    --error-bg: #FBEEEA;
    --success: #2A7F72;
    --success-bg: #EAF4F2;
    --radius: 14px;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-tap-highlight-color: transparent;
    padding-bottom: env(safe-area-inset-bottom);
  }

  header {
    padding: 20px 20px 14px;
  }

  header .eyebrow {
    font-family: 'Manrope', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }

  header h1 {
    font-family: 'Manrope', sans-serif;
    font-size: 26px;
    font-weight: 800;
    margin: 4px 0 0;
  }

  main {
    padding: 0 20px 40px;
    max-width: 480px;
    margin: 0 auto;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 18px;
    margin-bottom: 16px;
  }

  .card h2 {
    font-family: 'Manrope', sans-serif;
    font-size: 15px;
    font-weight: 700;
    margin: 0 0 10px;
  }

  .status-row {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
    color: var(--ink-soft);
  }

  .dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: var(--ink-soft);
    flex-shrink: 0;
    transition: background 0.2s;
  }

  .dot.ok { background: var(--success); }
  .dot.error { background: var(--error); }

  button {
    font-family: 'Manrope', sans-serif;
    font-weight: 700;
    font-size: 15px;
    border: none;
    border-radius: 10px;
    padding: 13px 18px;
    cursor: pointer;
    width: 100%;
    background: var(--accent);
    color: var(--accent-ink);
    transition: opacity 0.15s;
  }

  button:active { opacity: 0.75; }

  button.secondary {
    background: transparent;
    border: 1.5px solid var(--line);
    color: var(--ink);
  }

  .result-box {
    margin-top: 12px;
    padding: 12px;
    border-radius: 10px;
    font-size: 13px;
    font-family: 'Manrope', sans-serif;
    display: none;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .result-box.ok {
    display: block;
    background: var(--success-bg);
    color: var(--success);
  }

  .result-box.error {
    display: block;
    background: var(--error-bg);
    color: var(--error);
  }

  .macro-key {
    display: flex;
    gap: 14px;
    margin-top: 12px;
    font-size: 12px;
    color: var(--ink-soft);
  }

  .macro-key span {
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .swatch {
    width: 9px;
    height: 9px;
    border-radius: 50%;
  }

  .swatch.protein { background: var(--protein); }
  .swatch.carbs { background: var(--carbs); }
  .swatch.fat { background: var(--fat); }

  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--ink-soft);
    margin-bottom: 6px;
  }

  input[type="text"], input[type="password"] {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1.5px solid var(--line);
    font-size: 15px;
    font-family: 'Inter', sans-serif;
    margin-bottom: 14px;
    background: var(--bg);
    color: var(--ink);
  }

  input:focus {
    outline: none;
    border-color: var(--accent);
  }

  .helper {
    font-size: 12px;
    color: var(--ink-soft);
    margin-top: -6px;
    margin-bottom: 14px;
    line-height: 1.5;
  }

</style>
</head>
<body>

<header>
  <div class="eyebrow">Setup</div>
  <h1>Nutrition Tracker</h1>
</header>

<main>

  <div class="card">
    <h2>Connect to your backend</h2>
    <label for="apiUrl">Apps Script Web App URL</label>
    <input type="text" id="apiUrl" placeholder="https://script.google.com/macros/s/.../exec">
    <label for="apiToken">API Token</label>
    <input type="password" id="apiToken" placeholder="your token">
    <div class="helper">Saved on this device only — never sent anywhere except your own backend.</div>
    <button onclick="saveConfigAndTest()">Save & Test Connection</button>
    <div class="status-row" id="statusRow" style="margin-top:14px;">
      <div class="dot" id="statusDot"></div>
      <span id="statusText">Not connected yet</span>
    </div>
    <div class="result-box" id="resultBox"></div>
  </div>

  <div class="card">
    <h2>Macro key</h2>
    <div class="helper">Used consistently across the app once we build the logging screens.</div>
    <div class="macro-key">
      <span><div class="swatch protein"></div>Protein</span>
      <span><div class="swatch carbs"></div>Carbs</span>
      <span><div class="swatch fat"></div>Fat</span>
    </div>
  </div>

</main>

<script>

// ---- Config persistence (localStorage is fine here — this is a
// device-local app setting, not app data, so it's an appropriate
// use distinct from artifact restrictions elsewhere) ----

function saveConfig(url, token) {
  localStorage.setItem("apiUrl", url.trim());
  localStorage.setItem("apiToken", token.trim());
}

function loadConfig() {
  return {
    url: localStorage.getItem("apiUrl") || "",
    token: localStorage.getItem("apiToken") || ""
  };
}

// Pre-fill fields if already saved from a previous visit
window.addEventListener("load", function() {
  const config = loadConfig();
  document.getElementById("apiUrl").value = config.url;
  document.getElementById("apiToken").value = config.token;

  if (config.url && config.token) {
    testConnection(config.url, config.token);
  }

  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("./sw.js").catch(function(err) {
      console.log("Service worker registration failed:", err);
    });
  }
});

function saveConfigAndTest() {
  const url = document.getElementById("apiUrl").value;
  const token = document.getElementById("apiToken").value;

  if (!url || !token) {
    setStatus(false, "Enter both the URL and token first.");
    return;
  }

  saveConfig(url, token);
  testConnection(url, token);
}

function setStatus(ok, message) {
  const dot = document.getElementById("statusDot");
  dot.className = "dot " + (ok ? "ok" : "error");
  document.getElementById("statusText").textContent = message;
}

function showResult(ok, message) {
  const box = document.getElementById("resultBox");
  box.className = "result-box " + (ok ? "ok" : "error");
  box.textContent = message;
}

function testConnection(url, token) {

  setStatus(false, "Connecting...");

  const separator = url.indexOf("?") === -1 ? "?" : "&";
  const pingUrl = url + separator + "action=ping&token=" + encodeURIComponent(token);

  fetch(pingUrl)
    .then(function(response) { return response.json(); })
    .then(function(json) {
      if (json.success) {
        setStatus(true, "Connected");
        showResult(true, "Backend responded: " + json.data.message);
      } else {
        setStatus(false, "Connection failed");
        showResult(false, "Error from backend: " + json.error);
      }
    })
    .catch(function(err) {
      setStatus(false, "Connection failed");
      showResult(false, "Could not reach the backend: " + err.message);
    });

}

</script>

</body>
</html>
