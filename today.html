<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Daily Log</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#1C2530">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./style.css">
<style>

  .totals-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-bottom: 4px;
  }

  .total-tile {
    background: var(--bg);
    border-radius: 10px;
    padding: 12px 10px;
    text-align: center;
  }

  .total-tile .value { font-family: 'Manrope', sans-serif; font-size: 20px; font-weight: 800; }
  .total-tile .label { font-size: 11px; color: var(--ink-soft); margin-top: 2px; }
  .total-tile.protein .value { color: var(--protein); }
  .total-tile.carbs .value { color: var(--carbs); }
  .total-tile.fat .value { color: var(--fat); }

  .meal-group { margin-bottom: 18px; }
  .meal-group:last-child { margin-bottom: 0; }

  .meal-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
  .meal-header h3 { font-family: 'Manrope', sans-serif; font-size: 14px; font-weight: 800; margin: 0; }
  .meal-header .meal-cal { font-size: 12px; color: var(--ink-soft); }

  .repeat-btn {
    width: auto; padding: 5px 10px; font-size: 11px;
    background: var(--bg); color: var(--ink-soft); border: 1px solid var(--line); margin-top: 6px;
  }

  .entry-row, .exercise-group-row { padding: 10px 0; border-bottom: 1px solid var(--line); }
  .entry-row:last-child, .exercise-group-row:last-child { border-bottom: none; }

  .entry-top { display: flex; justify-content: space-between; align-items: baseline; font-size: 14px; }
  .entry-name { font-weight: 600; }
  .entry-meta { font-size: 12px; color: var(--ink-soft); margin-top: 3px; }
  .entry-meta .protein { color: var(--protein); }
  .entry-meta .carbs { color: var(--carbs); }
  .entry-meta .fat { color: var(--fat); }

  .entry-actions { display: flex; gap: 4px; flex-shrink: 0; }
  .entry-actions button { width: auto; padding: 2px 6px; font-size: 13px; background: transparent; border: none; color: var(--ink-soft); }
  .entry-actions .entry-delete-btn { color: var(--error); }

  .entry-edit-form { display: none; background: var(--bg); border-radius: 8px; padding: 10px; margin-top: 8px; }
  .entry-edit-form.open { display: block; }
  .entry-edit-form .row-2 { margin-bottom: 0; }
  .entry-edit-form input, .entry-edit-form select { margin-bottom: 8px; }
  .entry-edit-form button { width: auto; padding: 8px 14px; font-size: 13px; margin-right: 6px; }

  .date-nav { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 14px; }
  .date-nav button { width: auto; padding: 8px 12px; background: var(--surface); border: 1.5px solid var(--line); color: var(--ink); }
  .date-nav input { margin-bottom: 0; text-align: center; }

  .set-row { display: flex; justify-content: space-between; align-items: center; font-size: 13px; padding: 6px 0; border-bottom: 1px solid var(--line); }
  .set-row:last-child { border-bottom: none; }
  .set-delete-btn { width: auto; padding: 0 6px; font-size: 15px; background: transparent; border: none; color: var(--error); }

  .progress-summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 14px; margin-top: 4px; }
  .progress-summary-grid .label { color: var(--ink-soft); }
  .progress-summary-grid .value { font-weight: 700; font-family: 'Manrope', sans-serif; }

  .ach-earned-row { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--line); font-size: 14px; }
  .ach-earned-row:last-child { border-bottom: none; }

</style>
</head>
<body>

<header>
  <div class="titles">
    <div class="eyebrow">Overview</div>
    <h1>Daily Log</h1>
  </div>
  <a class="back" href="./log.html">Log &rarr;</a>
</header>

<main>

  <div class="card">
    <div class="date-nav">
      <button onclick="shiftDate(-1)">&larr;</button>
      <input type="date" id="dateInput" onchange="onDateChange()">
      <button onclick="shiftDate(1)">&rarr;</button>
    </div>

    <div class="segmented">
      <button class="active" id="tabFoodBtn" onclick="setTab('food')">Food</button>
      <button id="tabWorkoutsBtn" onclick="setTab('workouts')">Workouts</button>
      <button id="tabProgressBtn" onclick="setTab('progress')">Progress</button>
    </div>
  </div>

  <!-- ============ FOOD TAB ============ -->
  <div id="foodTab">

    <div class="card">
      <div class="totals-grid">
        <div class="total-tile">
          <div class="value" id="totalCalories">–</div>
          <div class="label">Calories</div>
        </div>
        <div class="total-tile protein">
          <div class="pct-label" id="pctProtein"></div>
          <div class="value" id="totalProtein">–</div>
          <div class="label">Protein (g)</div>
        </div>
        <div class="total-tile carbs">
          <div class="pct-label" id="pctCarbs"></div>
          <div class="value" id="totalCarbs">–</div>
          <div class="label">Carbs (g)</div>
        </div>
        <div class="total-tile fat">
          <div class="pct-label" id="pctFat"></div>
          <div class="value" id="totalFat">–</div>
          <div class="label">Fat (g)</div>
        </div>
        <div class="total-tile">
          <div class="value" id="totalFiber">–</div>
          <div class="label">Fiber (g)</div>
        </div>
        <div class="total-tile">
          <div class="value" id="totalNetCarbs">–</div>
          <div class="label">Net Carbs (g)</div>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>Entries</h2>
      <div id="entriesList"><div class="empty-state">Loading...</div></div>
    </div>

  </div>

  <!-- ============ WORKOUTS TAB ============ -->
  <div id="workoutsTab" style="display:none;">
    <div class="card">
      <h2>Workout</h2>
      <div id="workoutList"><div class="empty-state">Loading...</div></div>
    </div>
  </div>

  <!-- ============ PROGRESS TAB ============ -->
  <div id="progressTab" style="display:none;">

    <div class="card">
      <h2>Progress entry</h2>
      <div id="progressSummary"><div class="empty-state">Loading...</div></div>
    </div>

    <div class="card">
      <h2>Achievements earned this day</h2>
      <div id="achievementsForDay"><div class="empty-state">Loading...</div></div>
    </div>

  </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./calc.js"></script>
<script src="./app.js"></script>
<script>

const MEAL_ORDER = ["Breakfast", "Lunch", "Dinner", "Snack"];
let currentTab = "food";

window.addEventListener("load", async function() {

  const session = await requireAuth();
  if (!session) return;

  document.getElementById("dateInput").value = localDateString();
  registerServiceWorker();
  loadDay();

});

function todayString() {
  return localDateString();
}

function setTab(tab) {
  currentTab = tab;
  document.getElementById("tabFoodBtn").classList.toggle("active", tab === "food");
  document.getElementById("tabWorkoutsBtn").classList.toggle("active", tab === "workouts");
  document.getElementById("tabProgressBtn").classList.toggle("active", tab === "progress");
  document.getElementById("foodTab").style.display = (tab === "food") ? "block" : "none";
  document.getElementById("workoutsTab").style.display = (tab === "workouts") ? "block" : "none";
  document.getElementById("progressTab").style.display = (tab === "progress") ? "block" : "none";
}

function onDateChange() {
  loadDay();
}

function shiftDate(days) {
  const input = document.getElementById("dateInput");
  const current = new Date(input.value + "T00:00:00");
  current.setDate(current.getDate() + days);
  input.value = localDateString(current);
  loadDay();
}

function loadDay() {
  loadFoodTab();
  loadWorkoutsTab();
  loadProgressTab();
}

// ============================================================
// FOOD TAB
// ============================================================

function loadFoodTab() {

  const date = document.getElementById("dateInput").value;

  document.getElementById("entriesList").innerHTML = "<div class='empty-state'>Loading...</div>";
  setTotals({ calories: "–", protein: "–", fat: "–", carbs: "–", fiber: "–", netCarbs: "–" });

  apiGet("getDailyLogEntries", { date: date }).then(function(json) {

    if (!json.success) {
      document.getElementById("entriesList").innerHTML = "<div class='empty-state'>" + escapeHtml(json.error) + "</div>";
      return;
    }

    setTotals(json.data.totals);
    renderGroupedEntries(json.data.entries, date);

  }).catch(function(err) {
    document.getElementById("entriesList").innerHTML =
      "<div class='empty-state'>Could not reach the backend: " + escapeHtml(err.message) + "</div>";
  });

}

function setTotals(totals) {
  document.getElementById("totalCalories").textContent = formatAmountForDisplay(totals.calories);
  document.getElementById("totalProtein").textContent = formatAmountForDisplay(totals.protein);
  document.getElementById("totalCarbs").textContent = formatAmountForDisplay(totals.carbs);
  document.getElementById("totalFat").textContent = formatAmountForDisplay(totals.fat);
  document.getElementById("totalFiber").textContent = formatAmountForDisplay(totals.fiber);
  document.getElementById("totalNetCarbs").textContent = formatAmountForDisplay(totals.netCarbs);

  const pct = calculateMacroPercents(totals);
  document.getElementById("pctProtein").textContent = totals.calories ? pct.protein + "%" : "";
  document.getElementById("pctCarbs").textContent = totals.calories ? pct.carbs + "%" : "";
  document.getElementById("pctFat").textContent = totals.calories ? pct.fat + "%" : "";
}

function renderGroupedEntries(entries, viewedDate) {

  const container = document.getElementById("entriesList");

  if (entries.length === 0) {
    container.innerHTML = "<div class='empty-state'>Nothing logged for this day yet. <a href='./log.html'>Log something &rarr;</a></div>";
    return;
  }

  const groups = {};
  entries.forEach(function(e) {
    const meal = e.meal || "Other";
    if (!groups[meal]) groups[meal] = [];
    groups[meal].push(e);
  });

  const mealNames = Object.keys(groups).sort(function(a, b) {
    const ai = MEAL_ORDER.indexOf(a);
    const bi = MEAL_ORDER.indexOf(b);
    return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
  });

  const isPastDay = viewedDate !== todayString();

  container.innerHTML = mealNames.map(function(meal) {

    const mealEntries = groups[meal];
    const mealCalories = mealEntries.reduce(function(sum, e) { return sum + (Number(e.calories) || 0); }, 0);

    const entriesHtml = mealEntries.map(function(e) {
      const safeId = jsStringLiteral(e.id);
      return "<div class='entry-row'>" +
        "<div class='entry-top'>" +
          "<span class='entry-name'>" + escapeHtml(e.name) + "</span>" +
          "<span class='entry-actions'>" +
            "<button onclick='toggleEditEntry(" + safeId + ")'>&#9998;</button>" +
            "<button class='entry-delete-btn' onclick='deleteEntry(" + safeId + ")'>&times;</button>" +
          "</span>" +
        "</div>" +
        "<div class='entry-meta'>" +
          formatAmountForDisplay(e.amount) + " " + escapeHtml(e.unit) + " &middot; " +
          formatAmountForDisplay(e.calories) + " cal &middot; " +
          "<span class='protein'>" + formatAmountForDisplay(e.protein) + "g P</span> &middot; " +
          "<span class='carbs'>" + formatAmountForDisplay(e.carbs) + "g C</span> &middot; " +
          "<span class='fat'>" + formatAmountForDisplay(e.fat) + "g F</span>" +
        "</div>" +
        (e.notes ? "<div class='entry-meta'>" + escapeHtml(e.notes) + "</div>" : "") +
        "<div class='entry-edit-form' id='editForm_" + e.id + "'>" +
          "<div class='row-2'>" +
            "<input type='text' id='editAmount_" + e.id + "' value='" + escapeHtml(e.amount) + "' placeholder='amount'>" +
            "<select id='editUnit_" + e.id + "'>" +
              ["g","kg","oz","lb","ml","l","tsp","tbsp","cup","fl_oz","piece","serving"].map(function(u) {
                const label = (u === "serving") ? "serving(s)" : (u === "piece") ? "piece(s)" : u;
                return "<option value='" + u + "'" + (e.unit === u ? " selected" : "") + ">" + label + "</option>";
              }).join("") +
            "</select>" +
          "</div>" +
          "<select id='editMeal_" + e.id + "'>" +
            ["Breakfast","Lunch","Dinner","Snack"].map(function(m) {
              return "<option value='" + m + "'" + (e.meal === m ? " selected" : "") + ">" + m + "</option>";
            }).join("") +
          "</select>" +
          "<button onclick='saveEntryEdit(" + safeId + ")'>Save</button>" +
          "<button class='secondary' onclick='toggleEditEntry(" + safeId + ")'>Cancel</button>" +
        "</div>" +
      "</div>";
    }).join("");

    const repeatButton = isPastDay
      ? "<button class='repeat-btn' onclick='repeatMealToToday(" + jsStringLiteral(viewedDate) + ", " + jsStringLiteral(meal) + ")'>Repeat this meal to today</button>"
      : "";

    return "<div class='meal-group'>" +
      "<div class='meal-header'><h3>" + escapeHtml(meal) + "</h3>" +
      "<span class='meal-cal'>" + Math.round(mealCalories) + " cal</span></div>" +
      entriesHtml +
      repeatButton +
    "</div>";

  }).join("");

}

function toggleEditEntry(id) {
  document.getElementById("editForm_" + id).classList.toggle("open");
}

function saveEntryEdit(id) {

  const amount = parseFloat(document.getElementById("editAmount_" + id).value);
  const unit = document.getElementById("editUnit_" + id).value;
  const meal = document.getElementById("editMeal_" + id).value;

  if (!amount || isNaN(amount) || amount <= 0) { alert("Enter a valid amount."); return; }

  apiPost("updateDailyLogEntry", { id: id, amount: amount, unit: unit, meal: meal }).then(function(json) {
    if (!json.success) { alert("Could not update entry: " + json.error); return; }
    loadFoodTab();
  }).catch(function(err) {
    alert("Could not reach the backend: " + err.message);
  });

}

function deleteEntry(id) {
  if (!confirm("Remove this entry from your log?")) return;
  apiPost("deleteDailyLogEntry", { id: id }).then(function(json) {
    if (!json.success) { alert("Could not delete entry: " + json.error); return; }
    loadFoodTab();
  }).catch(function(err) {
    alert("Could not reach the backend: " + err.message);
  });
}

function repeatMealToToday(sourceDate, meal) {
  if (!confirm("Repeat " + meal + " from " + sourceDate + " to today?")) return;
  apiPost("repeatMeal", { sourceDate: sourceDate, meal: meal, targetDate: todayString() }).then(function(json) {
    if (!json.success) { alert("Could not repeat meal: " + json.error); return; }
    alert("Added " + json.data.count + " item(s) to today.");
  }).catch(function(err) {
    alert("Could not reach the backend: " + err.message);
  });
}

// ============================================================
// WORKOUTS TAB
// ============================================================

function loadWorkoutsTab() {

  const date = document.getElementById("dateInput").value;
  document.getElementById("workoutList").innerHTML = "<div class='empty-state'>Loading...</div>";

  apiGet("getWorkoutEntries", { date: date }).then(function(json) {
    if (!json.success) {
      document.getElementById("workoutList").innerHTML = "<div class='empty-state'>" + escapeHtml(json.error) + "</div>";
      return;
    }
    renderWorkoutEntries(json.data.entries);
  }).catch(function(err) {
    document.getElementById("workoutList").innerHTML = "<div class='empty-state'>Could not reach the backend: " + escapeHtml(err.message) + "</div>";
  });

}

function renderWorkoutEntries(entries) {

  const container = document.getElementById("workoutList");

  if (entries.length === 0) {
    container.innerHTML = "<div class='empty-state'>No workout logged for this day. <a href='./workout.html'>Log a workout &rarr;</a></div>";
    return;
  }

  const groups = {};
  entries.forEach(function(e) {
    if (!groups[e.exercise]) groups[e.exercise] = [];
    groups[e.exercise].push(e);
  });

  const workoutName = entries[0].workoutName;
  let html = workoutName ? "<div class='helper' style='margin-top:0;'>" + escapeHtml(workoutName) + "</div>" : "";

  html += Object.keys(groups).map(function(exercise) {

    const sets = groups[exercise].sort(function(a, b) { return (a.setNumber || 0) - (b.setNumber || 0); });

    const setsHtml = sets.map(function(s) {
      return "<div class='set-row'>" +
        "<span>Set " + s.setNumber + ": " + formatAmountForDisplay(s.weight) + s.unit + " &times; " + s.reps +
          (s.notes ? " — " + escapeHtml(s.notes) : "") + "</span>" +
        "<button class='set-delete-btn' onclick='deleteSet(" + jsStringLiteral(s.id) + ")'>&times;</button>" +
      "</div>";
    }).join("");

    return "<div class='exercise-group-row'><h3 style=\"font-family:'Manrope',sans-serif; font-size:14px; font-weight:800; margin:0 0 6px;\">" +
      escapeHtml(exercise) + "</h3>" + setsHtml + "</div>";

  }).join("");

  container.innerHTML = html;

}

function deleteSet(id) {
  if (!confirm("Remove this set?")) return;
  apiPost("deleteWorkoutSet", { id: id }).then(function(json) {
    if (!json.success) { alert("Could not delete set: " + json.error); return; }
    loadWorkoutsTab();
  }).catch(function(err) {
    alert("Could not reach the backend: " + err.message);
  });
}

// ============================================================
// PROGRESS TAB
// ============================================================

async function loadProgressTab() {

  const date = document.getElementById("dateInput").value;
  const summaryEl = document.getElementById("progressSummary");
  const achEl = document.getElementById("achievementsForDay");

  summaryEl.innerHTML = "<div class='empty-state'>Loading...</div>";
  achEl.innerHTML = "<div class='empty-state'>Loading...</div>";

  try {

    const userId = await getCurrentUserId();

    const { data: progress } = await sb.from("progress_log").select("*").eq("user_id", userId).eq("log_date", date).maybeSingle();

    if (!progress) {
      summaryEl.innerHTML = "<div class='empty-state'>No progress logged for this day. <a href='./progress.html'>Log progress &rarr;</a></div>";
    } else {
      const rows = [];
      if (progress.weight) rows.push(["Weight", formatAmountForDisplay(progress.weight)]);
      if (progress.exercise_type) rows.push(["Exercise Type", progress.exercise_type]);
      if (progress.duration) rows.push(["Duration (min)", formatAmountForDisplay(progress.duration)]);
      if (progress.distance) rows.push(["Distance", formatAmountForDisplay(progress.distance)]);
      if (progress.steps) rows.push(["Steps", progress.steps]);
      if (progress.sleep_hours) rows.push(["Sleep (hrs)", formatAmountForDisplay(progress.sleep_hours)]);
      rows.push(["Gym", progress.gym ? "Yes" : "No"]);
      rows.push(["Water Goal Met", progress.water_goal_met ? "Yes" : "No"]);

      summaryEl.innerHTML = "<div class='progress-summary-grid'>" +
        rows.map(function(r) { return "<div class='label'>" + r[0] + "</div><div class='value'>" + r[1] + "</div>"; }).join("") +
        "</div>" +
        (progress.notes ? "<div class='helper' style='margin-top:10px; margin-bottom:0;'>" + escapeHtml(progress.notes) + "</div>" : "") +
        "<a href='./progress.html' class='helper' style='margin-top:10px; margin-bottom:0; display:block;'>Edit in Progress screen &rarr;</a>";
    }

    const { data: achievements } = await sb.from("achievements").select("label, category").eq("user_id", userId).eq("date_earned", date);

    if (!achievements || achievements.length === 0) {
      achEl.innerHTML = "<div class='empty-state'>Nothing earned this day.</div>";
    } else {
      achEl.innerHTML = achievements.map(function(a) {
        return "<div class='ach-earned-row'>&#127942; <span>" + escapeHtml(a.label) +
          (a.category ? " <span style='color:var(--ink-soft); font-size:12px;'>(" + escapeHtml(a.category) + ")</span>" : "") +
          "</span></div>";
      }).join("");
    }

  } catch (err) {
    summaryEl.innerHTML = "<div class='empty-state'>" + escapeHtml(err.message) + "</div>";
    achEl.innerHTML = "";
  }

}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = String(str);
  return div.innerHTML;
}

</script>

</body>
</html>
