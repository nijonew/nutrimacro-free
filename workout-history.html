<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Workout History</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#1C2530">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./style.css">
<style>

  .date-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 4px;
  }

  .date-nav button {
    width: auto;
    padding: 8px 12px;
    background: var(--surface);
    border: 1.5px solid var(--line);
    color: var(--ink);
  }

  .date-nav input {
    margin-bottom: 0;
    text-align: center;
  }

  .exercise-group { margin-bottom: 16px; }
  .exercise-group:last-child { margin-bottom: 0; }

  .exercise-group h3 {
    font-family: 'Manrope', sans-serif;
    font-size: 14px;
    font-weight: 800;
    margin: 0 0 6px;
  }

  .set-row {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    padding: 6px 0;
    border-bottom: 1px solid var(--line);
  }

  .set-row:last-child { border-bottom: none; }

</style>
</head>
<body>

<header>
  <div class="titles">
    <div class="eyebrow">Workouts</div>
    <h1>Workout History</h1>
  </div>
  <a class="back" href="./workout.html">Log &rarr;</a>
</header>

<main>

  <div class="card">
    <div class="date-nav">
      <button onclick="shiftDate(-1)">&larr;</button>
      <input type="date" id="dateInput" onchange="onDateChange()">
      <button onclick="shiftDate(1)">&rarr;</button>
    </div>
  </div>

  <div class="card">
    <h2>Sets logged</h2>
    <div id="entriesList">
      <div class="empty-state">Loading...</div>
    </div>
  </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./calc.js"></script>
<script src="./app.js"></script>
<script>

window.addEventListener("load", async function() {

  const session = await requireAuth();
  if (!session) return;

  document.getElementById("dateInput").valueAsDate = new Date();
  registerServiceWorker();
  loadDay();

});

function onDateChange() {
  loadDay();
}

function shiftDate(days) {
  const input = document.getElementById("dateInput");
  const current = new Date(input.value + "T00:00:00");
  current.setDate(current.getDate() + days);
  input.valueAsDate = current;
  loadDay();
}

function loadDay() {

  const date = document.getElementById("dateInput").value;
  document.getElementById("entriesList").innerHTML = "<div class='empty-state'>Loading...</div>";

  apiGet("getWorkoutEntries", { date: date }).then(function(json) {

    if (!json.success) {
      document.getElementById("entriesList").innerHTML =
        "<div class='empty-state'>" + escapeHtml(json.error) + "</div>";
      return;
    }

    renderEntries(json.data.entries);

  }).catch(function(err) {
    document.getElementById("entriesList").innerHTML =
      "<div class='empty-state'>Could not reach the backend: " + escapeHtml(err.message) + "</div>";
  });

}

function renderEntries(entries) {

  const container = document.getElementById("entriesList");

  if (entries.length === 0) {
    container.innerHTML = "<div class='empty-state'>No workout logged for this day.</div>";
    return;
  }

  const groups = {};
  entries.forEach(function(e) {
    if (!groups[e.exercise]) groups[e.exercise] = [];
    groups[e.exercise].push(e);
  });

  const workoutName = entries[0].workoutName;

  let html = "";
  if (workoutName) {
    html += "<div class='helper' style='margin-top:0;'>" + escapeHtml(workoutName) + "</div>";
  }

  html += Object.keys(groups).map(function(exercise) {

    const sets = groups[exercise].sort(function(a, b) { return (a.setNumber || 0) - (b.setNumber || 0); });

    const setsHtml = sets.map(function(s) {
      return "<div class='set-row'>" +
        "<span>Set " + s.setNumber + ": " + s.weight + s.unit + " &times; " + s.reps + "</span>" +
        (s.notes ? "<span style='color:var(--ink-soft);'>" + escapeHtml(s.notes) + "</span>" : "") +
      "</div>";
    }).join("");

    return "<div class='exercise-group'><h3>" + escapeHtml(exercise) + "</h3>" + setsHtml + "</div>";

  }).join("");

  container.innerHTML = html;

}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = String(str);
  return div.innerHTML;
}

</script>

</body>
</html>
