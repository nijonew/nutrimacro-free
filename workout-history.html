<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Workout History</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#1C2530">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./style.css">
<style>

  .totals-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 4px;
  }

  .total-tile {
    background: var(--bg);
    border-radius: 10px;
    padding: 12px 10px;
    text-align: center;
  }

  .total-tile .value {
    font-family: 'Manrope', sans-serif;
    font-size: 20px;
    font-weight: 800;
  }

  .total-tile .label {
    font-size: 11px;
    color: var(--ink-soft);
    margin-top: 2px;
  }

  .exercise-group { margin-bottom: 16px; }
  .exercise-group:last-child { margin-bottom: 0; }

  .exercise-group h3 {
    font-family: 'Manrope', sans-serif;
    font-size: 14px;
    font-weight: 800;
    margin: 0 0 6px;
  }

  .set-line {
    font-size: 13px;
    padding: 5px 0;
    border-bottom: 1px solid var(--line);
  }

  .set-line:last-child { border-bottom: none; }

  .date-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 14px;
  }

  .date-nav button {
    width: auto;
    padding: 8px 12px;
    background: var(--surface);
    border: 1.5px solid var(--line);
    color: var(--ink);
  }

  .date-nav input { margin-bottom: 0; text-align: center; }

</style>
</head>
<body>

<header>
  <div class="titles">
    <div class="eyebrow">Workouts</div>
    <h1>History</h1>
  </div>
  <a class="back" href="./workout.html">Log &rarr;</a>
</header>

<main>

  <div class="card">
    <div class="date-nav">
      <button onclick="shiftDate(-1)">&larr;</button>
      <input type="date" id="dateInput" onchange="loadDay()">
      <button onclick="shiftDate(1)">&rarr;</button>
    </div>

    <div class="totals-grid">
      <div class="total-tile">
        <div class="value" id="totalSets">–</div>
        <div class="label">Total Sets</div>
      </div>
      <div class="total-tile">
        <div class="value" id="totalVolume">–</div>
        <div class="label">Total Volume (wt &times; reps)</div>
      </div>
    </div>
  </div>

  <div class="card">
    <h2>Exercises</h2>
    <div id="exerciseGroups">
      <div class="empty-state">Loading...</div>
    </div>
  </div>

</main>

<script src="./app.js"></script>
<script>

window.addEventListener("load", function() {

  if (!isConfigured()) {
    window.location.href = "./index.html";
    return;
  }

  document.getElementById("dateInput").valueAsDate = new Date();
  registerServiceWorker();
  loadDay();

});

function shiftDate(days) {
  const input = document.getElementById("dateInput");
  const current = new Date(input.value + "T00:00:00");
  current.setDate(current.getDate() + days);
  input.valueAsDate = current;
  loadDay();
}

function loadDay() {

  const date = document.getElementById("dateInput").value;

  document.getElementById("exerciseGroups").innerHTML = "<div class='empty-state'>Loading...</div>";
  document.getElementById("totalSets").textContent = "–";
  document.getElementById("totalVolume").textContent = "–";

  apiGet("getWorkoutEntries", { date: date }).then(function(json) {

    if (!json.success) {
      document.getElementById("exerciseGroups").innerHTML = "<div class='empty-state'>" + escapeHtml(json.error) + "</div>";
      return;
    }

    renderEntries(json.data.entries);

  }).catch(function(err) {
    document.getElementById("exerciseGroups").innerHTML =
      "<div class='empty-state'>Could not reach the backend: " + escapeHtml(err.message) + "</div>";
  });

}

function renderEntries(entries) {

  const container = document.getElementById("exerciseGroups");

  if (entries.length === 0) {
    container.innerHTML = "<div class='empty-state'>No workout logged for this day.</div>";
    document.getElementById("totalSets").textContent = "0";
    document.getElementById("totalVolume").textContent = "0";
    return;
  }

  document.getElementById("totalSets").textContent = entries.length;

  const totalVolume = entries.reduce(function(sum, e) {
    return sum + ((Number(e.weight) || 0) * (Number(e.reps) || 0));
  }, 0);
  document.getElementById("totalVolume").textContent = Math.round(totalVolume);

  const groups = {};
  entries.forEach(function(e) {
    if (!groups[e.exercise]) groups[e.exercise] = [];
    groups[e.exercise].push(e);
  });

  container.innerHTML = Object.keys(groups).map(function(exercise) {

    const sets = groups[exercise].sort(function(a, b) { return (a.setNumber || 0) - (b.setNumber || 0); });

    const setsHtml = sets.map(function(s) {
      return "<div class='set-line'>Set " + s.setNumber + ": " + s.weight + s.unit + " &times; " + s.reps +
        (s.notes ? " — " + escapeHtml(s.notes) : "") + "</div>";
    }).join("");

    return "<div class='exercise-group'><h3>" + escapeHtml(exercise) + "</h3>" + setsHtml + "</div>";

  }).join("");

}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = String(str);
  return div.innerHTML;
}

</script>

</body>
</html>
