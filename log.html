<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Log Food or Recipe</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#1C2530">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./style.css">
<style>

  .result-item.checkable {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .result-item.checkable input[type="checkbox"] {
    width: auto;
    margin: 0;
  }

  .cart-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 0;
    border-bottom: 1px solid var(--line);
    flex-wrap: wrap;
  }

  .cart-row:last-child { border-bottom: none; }

  .cart-name {
    flex-basis: 100%;
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 4px;
  }

  .cart-row input, .cart-row select {
    margin-bottom: 0;
    width: 68px;
    padding: 8px;
    font-size: 13px;
  }

  .cart-row select.unit-select { width: 78px; }
  .cart-row select.meal-select { width: 90px; }

  .remove-btn {
    width: auto;
    padding: 6px 10px;
    font-size: 16px;
    background: transparent;
    border: none;
    color: var(--error);
    line-height: 1;
  }

</style>
</head>
<body>

<header>
  <div class="titles">
    <div class="eyebrow">Daily Log</div>
    <h1>Log an Entry</h1>
  </div>
  <a class="back" href="./today.html">Today &rarr;</a>
</header>

<main>

  <!-- SEARCH: local first, USDA fallback -->
  <div class="card">
    <h2>Find foods</h2>

    <div class="segmented">
      <button id="typeFoodBtn" class="active" onclick="setType('Food')">Food</button>
      <button id="typeRecipeBtn" onclick="setType('Recipe')">Recipe</button>
    </div>

    <a href="./add-food.html" id="createFoodShortcut" style="text-decoration:none; display:block; margin-bottom:12px;">
      <button class="secondary">+ Create a New Food</button>
    </a>
    <a href="./recipe.html" id="createRecipeShortcut" style="text-decoration:none; display:none; margin-bottom:12px;">
      <button class="secondary">+ Create a New Recipe</button>
    </a>

    <label for="searchInput">Search</label>
    <input type="text" id="searchInput" placeholder="Start typing a name..." oninput="onSearchInput()" onkeypress="if(event.key==='Enter'){event.preventDefault();onEnterPressed();}">

    <div id="localResultsWrap">
      <div class="helper" style="margin-top:0;">Your foods</div>
      <div class="result-list" id="localResults"></div>
      <button class="secondary" id="addSelectedBtn" style="display:none; margin-top:0; margin-bottom:12px;" onclick="addSelectedToCart()">Add to Meal</button>
    </div>

    <div id="usdaSection" style="display:none;">
      <div class="helper">USDA database (tap one to import &amp; add)</div>
      <div class="result-list" id="usdaResults"></div>
    </div>

    <button class="secondary" id="searchUsdaBtn" style="display:none;" onclick="searchUsda()">
      Search USDA for &ldquo;<span id="usdaQueryLabel"></span>&rdquo;
    </button>

  </div>

  <!-- CART -->
  <div class="card" id="cartCard" style="display:none;">
    <h2>Your Meal (<span id="cartCount">0</span>)</h2>
    <div id="cartList"></div>
  </div>

  <!-- LOG DETAILS (shared across the whole cart) -->
  <div class="card" id="logDetailsCard" style="display:none;">
    <h2>Log details</h2>

    <div class="row-2">
      <div>
        <label for="dateInput">Date</label>
        <input type="date" id="dateInput">
      </div>
      <div>
        <label for="mealInput">Default Meal (for new items)</label>
        <select id="mealInput">
          <option>Breakfast</option>
          <option>Lunch</option>
          <option>Dinner</option>
          <option>Snack</option>
        </select>
      </div>
    </div>

    <label for="notesInput">Notes (optional, applied to all items)</label>
    <textarea id="notesInput" rows="2"></textarea>

    <button onclick="submitCart()">Log Meal</button>
    <div class="result-box" id="logResultBox"></div>

  </div>

</main>

<script src="./app.js"></script>
<script>

let currentType = "Food";
let localFoodNames = [];
let localRecipeNames = [];
let selectedNames = new Set();
let cart = []; // { type, name, amount, unit }

window.addEventListener("load", function() {

  if (!isConfigured()) {
    window.location.href = "./index.html";
    return;
  }

  document.getElementById("dateInput").valueAsDate = new Date();

  registerServiceWorker();
  loadLocalNames();

});

function loadLocalNames() {

  apiGet("getFoodNames").then(function(json) {
    if (json.success) localFoodNames = json.data;
  });

  apiGet("getRecipeNames").then(function(json) {
    if (json.success) localRecipeNames = json.data;
  });

}

function setType(type) {

  currentType = type;

  document.getElementById("typeFoodBtn").className = (type === "Food") ? "active" : "";
  document.getElementById("typeRecipeBtn").className = (type === "Recipe") ? "active" : "";

  document.getElementById("createFoodShortcut").style.display = (type === "Food") ? "block" : "none";
  document.getElementById("createRecipeShortcut").style.display = (type === "Recipe") ? "block" : "none";

  document.getElementById("searchUsdaBtn").style.display = "none";
  document.getElementById("usdaSection").style.display = "none";

  onSearchInput();

}

function onSearchInput() {

  const query = document.getElementById("searchInput").value.trim().toLowerCase();
  const source = (currentType === "Food") ? localFoodNames : localRecipeNames;

  selectedNames.clear();
  updateSelectedCount();

  const matches = query.length === 0
    ? []
    : source.filter(function(name) { return name.toLowerCase().indexOf(query) !== -1; }).slice(0, 8);

  renderLocalResults(matches, query);

  if (currentType === "Food" && query.length >= 2) {
    document.getElementById("usdaQueryLabel").textContent = query;
    document.getElementById("searchUsdaBtn").style.display = "block";
  } else {
    document.getElementById("searchUsdaBtn").style.display = "none";
  }

  document.getElementById("usdaSection").style.display = "none";
  document.getElementById("usdaResults").innerHTML = "";

}

function renderLocalResults(matches, query) {

  const container = document.getElementById("localResults");

  if (query.length === 0) {
    container.innerHTML = "<div class='empty-state'>Start typing to search your saved " +
      (currentType === "Food" ? "foods" : "recipes") + ".</div>";
    return;
  }

  if (matches.length === 0) {
    container.innerHTML = "<div class='empty-state'>No matches in your " +
      (currentType === "Food" ? "Foods" : "Recipes") + " list yet.</div>";
    return;
  }

  container.innerHTML = matches.map(function(name) {
    const safeId = "chk_" + btoa(unescape(encodeURIComponent(name))).replace(/[^a-zA-Z0-9]/g, "");
    return "<div class='result-item checkable'>" +
      "<input type='checkbox' id='" + safeId + "' onchange='toggleSelected(" + jsStringLiteral(name) + ", this.checked)'>" +
      "<label for='" + safeId + "' style='flex:1; margin:0; font-weight:600; color:var(--ink);'>" + escapeHtml(name) + "</label>" +
    "</div>";
  }).join("");

}

function toggleSelected(name, checked) {
  if (checked) selectedNames.add(name); else selectedNames.delete(name);
  updateSelectedCount();
}

function updateSelectedCount() {
  const count = selectedNames.size;
  const btn = document.getElementById("addSelectedBtn");
  if (count === 0) {
    btn.style.display = "none";
    document.getElementById("searchUsdaBtn").style.display =
      (currentType === "Food" && document.getElementById("searchInput").value.trim().length >= 2) ? "block" : "none";
  } else if (count === 1) {
    btn.style.display = "block";
    btn.textContent = "Add to Meal";
    document.getElementById("searchUsdaBtn").style.display = "none";
    document.getElementById("usdaSection").style.display = "none";
  } else {
    btn.style.display = "block";
    btn.textContent = "Add All (" + count + ") to Meal";
    document.getElementById("searchUsdaBtn").style.display = "none";
    document.getElementById("usdaSection").style.display = "none";
  }
}

function onEnterPressed() {

  const query = document.getElementById("searchInput").value.trim();

  if (currentType === "Food" && query.length >= 2 && selectedNames.size === 0) {
    searchUsda();
  }

}

function addSelectedToCart() {

  const names = Array.from(selectedNames);

  if (currentType === "Recipe") {

    names.forEach(function(name) {
      cart.push({ type: "Recipe", name: name, amount: "", unit: "serving", meal: document.getElementById("mealInput").value });
    });

    selectedNames.clear();
    document.getElementById("searchInput").value = "";
    onSearchInput();
    renderCart();
    return;

  }

  // Look up each food's native serving unit so it's pre-selected by
  // default, instead of always defaulting to grams.
  Promise.all(names.map(function(name) {
    return apiGet("getFoodDetails", { name: name }).then(function(json) {
      return { name: name, unit: (json.success && json.data.servingUnit) ? json.data.servingUnit : "g" };
    }).catch(function() {
      return { name: name, unit: "g" };
    });
  })).then(function(results) {

    results.forEach(function(r) {
      cart.push({ type: "Food", name: r.name, amount: "", unit: r.unit, meal: document.getElementById("mealInput").value });
    });

    selectedNames.clear();
    document.getElementById("searchInput").value = "";
    onSearchInput();
    renderCart();

  });

}

function searchUsda() {

  const query = document.getElementById("searchInput").value.trim();
  const usdaSection = document.getElementById("usdaSection");
  const usdaResults = document.getElementById("usdaResults");

  usdaSection.style.display = "block";
  usdaResults.innerHTML = "<div class='empty-state'>Searching USDA...</div>";

  apiGet("searchFoods", { query: query }).then(function(json) {

    if (!json.success) {
      usdaResults.innerHTML = "<div class='empty-state'>" + escapeHtml(json.error) + "</div>";
      return;
    }

    if (json.data.length === 0) {
      usdaResults.innerHTML = "<div class='empty-state'>No USDA results found.</div>";
      return;
    }

    usdaResults.innerHTML = json.data.map(function(food) {
      return "<div class='result-item' onclick='importAndAddToCart(" + food.fdcId + ")'>" +
        "<div class='item-name'>" + escapeHtml(food.description) + "</div>" +
        "<div class='item-meta'>" + escapeHtml(food.dataType) +
        (food.brand ? " &middot; " + escapeHtml(food.brand) : "") + "</div>" +
        "</div>";
    }).join("");

  }).catch(function(err) {
    usdaResults.innerHTML = "<div class='empty-state'>Could not reach USDA: " + escapeHtml(err.message) + "</div>";
  });

}

function importAndAddToCart(fdcId) {

  const usdaResults = document.getElementById("usdaResults");
  usdaResults.innerHTML = "<div class='empty-state'>Importing...</div>";

  apiPost("importFood", { fdcId: fdcId }).then(function(json) {

    if (!json.success) {
      usdaResults.innerHTML = "<div class='empty-state'>" + escapeHtml(json.error) + "</div>";
      return;
    }

    localFoodNames.push(json.data.description);
    cart.push({ type: "Food", name: json.data.description, amount: "", unit: "g", meal: document.getElementById("mealInput").value });

    document.getElementById("usdaSection").style.display = "none";
    document.getElementById("searchInput").value = "";
    onSearchInput();

    renderCart();

  }).catch(function(err) {
    usdaResults.innerHTML = "<div class='empty-state'>Import failed: " + escapeHtml(err.message) + "</div>";
  });

}

function removeCartItem(index) {
  cart.splice(index, 1);
  renderCart();
}

function updateCartAmount(index, value) {
  cart[index].amount = value;
}

function updateCartUnit(index, value) {
  cart[index].unit = value;
}

function renderCart() {

  const cartCard = document.getElementById("cartCard");
  const cartList = document.getElementById("cartList");
  const detailsCard = document.getElementById("logDetailsCard");

  document.getElementById("cartCount").textContent = cart.length;

  if (cart.length === 0) {
    cartCard.style.display = "none";
    detailsCard.style.display = "none";
    return;
  }

  cartCard.style.display = "block";
  detailsCard.style.display = "block";

  cartList.innerHTML = cart.map(function(item, i) {
    return "<div class='cart-row'>" +
      "<span class='cart-name'>" + escapeHtml(item.name) + "</span>" +
      "<select class='meal-select' onchange='updateCartMeal(" + i + ", this.value)'>" +
        ["Breakfast","Lunch","Dinner","Snack"].map(function(m) {
          return "<option value='" + m + "'" + (item.meal === m ? " selected" : "") + ">" + m + "</option>";
        }).join("") +
      "</select>" +
      "<input type='text' placeholder='amt' value='" + escapeHtml(item.amount) + "' " +
        "onchange='updateCartAmount(" + i + ", this.value)'>" +
      "<select class='unit-select' onchange='updateCartUnit(" + i + ", this.value)'>" +
        ["g","kg","oz","lb","ml","l","tsp","tbsp","cup","fl_oz","piece","serving"].map(function(u) {
          const label = (u === "serving") ? "serving(s)" : (u === "piece") ? "piece(s)" : u;
          return "<option value='" + u + "'" + (item.unit === u ? " selected" : "") + ">" + label + "</option>";
        }).join("") +
      "</select>" +
      "<button class='remove-btn' onclick='removeCartItem(" + i + ")'>&times;</button>" +
    "</div>";
  }).join("");

}

function updateCartMeal(index, value) {
  cart[index].meal = value;
}

function parseAmount(str) {

  str = String(str).trim();

  const mixedMatch = str.match(/^(\d+)\s+(\d+)\/(\d+)$/);
  if (mixedMatch) {
    const whole = parseInt(mixedMatch[1], 10);
    const num = parseInt(mixedMatch[2], 10);
    const denom = parseInt(mixedMatch[3], 10);
    if (denom === 0) return NaN;
    return whole + (num / denom);
  }

  const fractionMatch = str.match(/^(\d+)\/(\d+)$/);
  if (fractionMatch) {
    const num = parseInt(fractionMatch[1], 10);
    const denom = parseInt(fractionMatch[2], 10);
    if (denom === 0) return NaN;
    return num / denom;
  }

  return parseFloat(str);

}

function submitCart() {

  const date = document.getElementById("dateInput").value;
  const notes = document.getElementById("notesInput").value.trim();

  const entries = [];

  for (let i = 0; i < cart.length; i++) {

    const amount = parseAmount(cart[i].amount);

    if (!amount || isNaN(amount) || amount <= 0) {
      showLogResult(false, "Enter a valid amount for \"" + cart[i].name + "\".");
      return;
    }

    entries.push({
      date: date,
      meal: cart[i].meal,
      type: cart[i].type,
      name: cart[i].name,
      amount: amount,
      unit: cart[i].unit,
      notes: notes
    });

  }

  showLogResult(true, "Logging " + entries.length + " item(s)...");

  apiPost("batchLogEntries", { entries: entries }).then(function(json) {

    if (!json.success) {
      showLogResult(false, json.error);
      return;
    }

    const failures = json.data.filter(function(r) { return !r.success; });
    const successes = json.data.filter(function(r) { return r.success; });

    if (failures.length === 0) {
      showLogResult(true, "Logged all " + successes.length + " item(s).");
      cart = [];
      renderCart();
    } else {
      showLogResult(false,
        successes.length + " logged, " + failures.length + " failed:\n" +
        failures.map(function(f) { return f.name + ": " + f.error; }).join("\n")
      );
      // Keep only the failed items in the cart so they can be corrected and resubmitted
      cart = cart.filter(function(item) {
        return failures.some(function(f) { return f.name === item.name; });
      });
      renderCart();
    }

  }).catch(function(err) {
    showLogResult(false, "Could not reach the backend: " + err.message);
  });

}

function showLogResult(ok, message) {
  const box = document.getElementById("logResultBox");
  box.className = "result-box " + (ok ? "ok" : "error");
  box.textContent = message;
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = String(str);
  return div.innerHTML;
}

</script>

</body>
</html>
