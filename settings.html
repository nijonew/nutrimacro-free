<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Settings</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#1C2530">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./style.css">
</head>
<body>

<header>
  <div class="titles">
    <div class="eyebrow">Account</div>
    <h1>Settings</h1>
  </div>
  <a class="back" href="./index.html">&larr; Home</a>
</header>

<main>

  <div class="card">
    <h2>Profile</h2>

    <div class="row-2">
      <div>
        <label for="currentWeightInput">Current Weight</label>
        <input type="text" id="currentWeightInput" placeholder="e.g. 210">
      </div>
      <div>
        <label for="heightInput">Height (in)</label>
        <input type="text" id="heightInput" placeholder="e.g. 70">
      </div>
    </div>

    <div class="row-2">
      <div>
        <label for="startingWeightInput">Starting Weight</label>
        <input type="text" id="startingWeightInput">
      </div>
      <div>
        <label for="goalWeightInput">Goal Weight</label>
        <input type="text" id="goalWeightInput">
      </div>
    </div>

    <div class="row-2">
      <div>
        <label for="birthDateInput">Birth Date</label>
        <input type="date" id="birthDateInput">
      </div>
      <div>
        <label for="sexSelect">Sex</label>
        <select id="sexSelect">
          <option value="">—</option>
          <option value="Male">Male</option>
          <option value="Female">Female</option>
        </select>
      </div>
    </div>
  </div>

  <div class="card">
    <h2>Daily Goals</h2>

    <div class="row-2">
      <div>
        <label for="goalCaloriesInput">Calories</label>
        <input type="text" id="goalCaloriesInput">
      </div>
      <div>
        <label for="goalProteinInput">Protein (g)</label>
        <input type="text" id="goalProteinInput">
      </div>
    </div>

    <div class="row-2">
      <div>
        <label for="goalFatInput">Fat (g)</label>
        <input type="text" id="goalFatInput">
      </div>
      <div>
        <label for="goalCarbsInput">Carbs (g)</label>
        <input type="text" id="goalCarbsInput">
      </div>
    </div>

    <div class="row-2">
      <div>
        <label for="goalFiberInput">Fiber (g)</label>
        <input type="text" id="goalFiberInput">
      </div>
      <div>
        <label for="goalWaterInput">Water (oz)</label>
        <input type="text" id="goalWaterInput">
      </div>
    </div>

    <button onclick="saveSettings()">Save Settings</button>
    <div class="result-box" id="settingsResultBox"></div>
  </div>

  <div class="card">
    <h2>Account</h2>

    <label for="emailInput">Email</label>
    <input type="text" id="emailInput" placeholder="you@example.com">
    <button class="secondary" onclick="updateEmail()">Update Email</button>

    <label for="newPasswordInput" style="margin-top:16px;">New Password</label>
    <input type="password" id="newPasswordInput" placeholder="At least 6 characters">
    <button class="secondary" onclick="updatePassword()">Update Password</button>

    <div class="result-box" id="accountResultBox"></div>
  </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./calc.js"></script>
<script src="./app.js"></script>
<script>

window.addEventListener("load", async function() {

  const session = await requireAuth();
  if (!session) return;

  registerServiceWorker();
  document.getElementById("emailInput").value = session.user.email || "";

  loadSettings();

});

async function loadSettings() {

  const userId = await getCurrentUserId();
  const { data, error } = await sb.from("user_settings").select("*").eq("user_id", userId).maybeSingle();

  if (error) {
    showSettingsResult(false, error.message);
    return;
  }

  if (!data) return; // no row yet — form stays blank, first save will create it

  document.getElementById("currentWeightInput").value = data.current_weight || "";
  document.getElementById("heightInput").value = data.height || "";
  document.getElementById("startingWeightInput").value = data.starting_weight || "";
  document.getElementById("goalWeightInput").value = data.goal_weight || "";
  document.getElementById("birthDateInput").value = data.birth_date || "";
  document.getElementById("sexSelect").value = data.sex || "";
  document.getElementById("goalCaloriesInput").value = data.goal_calories || "";
  document.getElementById("goalProteinInput").value = data.goal_protein || "";
  document.getElementById("goalFatInput").value = data.goal_fat || "";
  document.getElementById("goalCarbsInput").value = data.goal_carbs || "";
  document.getElementById("goalFiberInput").value = data.goal_fiber || "";
  document.getElementById("goalWaterInput").value = data.goal_water || "";

}

async function saveSettings() {

  const userId = await getCurrentUserId();

  const record = {
    user_id: userId,
    current_weight: parseFloat(document.getElementById("currentWeightInput").value) || null,
    height: parseFloat(document.getElementById("heightInput").value) || null,
    starting_weight: parseFloat(document.getElementById("startingWeightInput").value) || null,
    goal_weight: parseFloat(document.getElementById("goalWeightInput").value) || null,
    birth_date: document.getElementById("birthDateInput").value || null,
    sex: document.getElementById("sexSelect").value || null,
    goal_calories: parseFloat(document.getElementById("goalCaloriesInput").value) || null,
    goal_protein: parseFloat(document.getElementById("goalProteinInput").value) || null,
    goal_fat: parseFloat(document.getElementById("goalFatInput").value) || null,
    goal_carbs: parseFloat(document.getElementById("goalCarbsInput").value) || null,
    goal_fiber: parseFloat(document.getElementById("goalFiberInput").value) || null,
    goal_water: parseFloat(document.getElementById("goalWaterInput").value) || null
  };

  showSettingsResult(true, "Saving...");

  const { error } = await sb.from("user_settings").upsert(record, { onConflict: "user_id" });

  if (error) {
    showSettingsResult(false, error.message);
    return;
  }

  showSettingsResult(true, "Settings saved.");

}

async function updateEmail() {

  const email = document.getElementById("emailInput").value.trim();
  if (!email) { showAccountResult(false, "Enter an email address."); return; }

  const { error } = await sb.auth.updateUser({ email: email });

  if (error) {
    showAccountResult(false, error.message);
    return;
  }

  showAccountResult(true, "Confirmation email sent — check your inbox to finish the change.");

}

async function updatePassword() {

  const password = document.getElementById("newPasswordInput").value;
  if (!password || password.length < 6) { showAccountResult(false, "Password must be at least 6 characters."); return; }

  const { error } = await sb.auth.updateUser({ password: password });

  if (error) {
    showAccountResult(false, error.message);
    return;
  }

  document.getElementById("newPasswordInput").value = "";
  showAccountResult(true, "Password updated.");

}

function showSettingsResult(ok, message) {
  const box = document.getElementById("settingsResultBox");
  box.className = "result-box " + (ok ? "ok" : "error");
  box.textContent = message;
}

function showAccountResult(ok, message) {
  const box = document.getElementById("accountResultBox");
  box.className = "result-box " + (ok ? "ok" : "error");
  box.textContent = message;
}

</script>

</body>
</html>
