<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Progress</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#1C2530">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./style.css">
<style>

  .checkbox-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
  }

  .checkbox-row input[type="checkbox"] {
    width: auto;
    margin: 0;
  }

  .checkbox-row label {
    margin: 0;
    font-weight: 600;
    font-size: 13px;
    color: var(--ink);
  }

  .progress-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--line);
    font-size: 13px;
  }

  .progress-row:last-child { border-bottom: none; }

  .progress-date { font-weight: 700; }

  .progress-meta { color: var(--ink-soft); margin-top: 2px; }

  .progress-delete {
    width: auto;
    padding: 4px 8px;
    font-size: 14px;
    background: transparent;
    border: none;
    color: var(--error);
  }

</style>
</head>
<body>

<header>
  <div class="titles">
    <div class="eyebrow">Progress</div>
    <h1>Log Progress</h1>
  </div>
  <a class="back" href="./achievements.html">Achievements &rarr;</a>
</header>

<main>

  <div class="card">
    <h2>Today's entry</h2>

    <label for="dateInput">Date</label>
    <input type="date" id="dateInput">

    <label for="weightInput">Weight</label>
    <input type="text" id="weightInput" placeholder="e.g. 210">

    <div class="row-2">
      <div>
        <label for="exerciseTypeInput">Exercise Type</label>
        <input type="text" id="exerciseTypeInput" placeholder="e.g. Pool, Machines">
      </div>
      <div>
        <label for="durationInput">Duration (min)</label>
        <input type="text" id="durationInput" placeholder="e.g. 45">
      </div>
    </div>

    <div class="row-2">
      <div>
        <label for="distanceInput">Distance</label>
        <input type="text" id="distanceInput" placeholder="e.g. 1.2">
      </div>
      <div>
        <label for="stepsInput">Steps</label>
        <input type="text" id="stepsInput" placeholder="e.g. 8000">
      </div>
    </div>

    <label for="sleepInput">Sleep (hours)</label>
    <input type="text" id="sleepInput" placeholder="e.g. 7.5">

    <div class="checkbox-row">
      <input type="checkbox" id="gymInput">
      <label for="gymInput">Went to the gym today</label>
    </div>

    <div class="checkbox-row">
      <input type="checkbox" id="waterGoalInput">
      <label for="waterGoalInput">Met water goal</label>
    </div>

    <label for="notesInput">Notes (optional)</label>
    <textarea id="notesInput" rows="2"></textarea>

    <button onclick="saveProgress()">Save Entry</button>
    <div class="result-box" id="saveResultBox"></div>
  </div>

  <div class="card">
    <h2>Recent entries</h2>
    <div id="progressList">
      <div class="empty-state">Loading...</div>
    </div>
  </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./calc.js"></script>
<script src="./app.js"></script>
<script>

window.addEventListener("load", async function() {

  const session = await requireAuth();
  if (!session) return;

  document.getElementById("dateInput").valueAsDate = new Date();
  registerServiceWorker();

  await loadTodayIfExists();
  await loadRecentEntries();

});

async function loadTodayIfExists() {

  const date = document.getElementById("dateInput").value;
  const userId = await getCurrentUserId();

  const { data, error } = await sb.from("progress_log").select("*").eq("user_id", userId).eq("log_date", date).maybeSingle();
  if (error || !data) return;

  document.getElementById("weightInput").value = data.weight || "";
  document.getElementById("exerciseTypeInput").value = data.exercise_type || "";
  document.getElementById("durationInput").value = data.duration || "";
  document.getElementById("distanceInput").value = data.distance || "";
  document.getElementById("stepsInput").value = data.steps || "";
  document.getElementById("sleepInput").value = data.sleep_hours || "";
  document.getElementById("gymInput").checked = !!data.gym;
  document.getElementById("waterGoalInput").checked = !!data.water_goal_met;
  document.getElementById("notesInput").value = data.notes || "";

}

async function saveProgress() {

  const date = document.getElementById("dateInput").value;
  if (!date) { showSaveResult(false, "Choose a date."); return; }

  const userId = await getCurrentUserId();

  const record = {
    user_id: userId,
    log_date: date,
    weight: parseFloat(document.getElementById("weightInput").value) || null,
    exercise_type: document.getElementById("exerciseTypeInput").value.trim() || null,
    duration: parseFloat(document.getElementById("durationInput").value) || null,
    distance: parseFloat(document.getElementById("distanceInput").value) || null,
    steps: parseInt(document.getElementById("stepsInput").value, 10) || null,
    sleep_hours: parseFloat(document.getElementById("sleepInput").value) || null,
    gym: document.getElementById("gymInput").checked,
    water_goal_met: document.getElementById("waterGoalInput").checked,
    notes: document.getElementById("notesInput").value.trim() || null
  };

  showSaveResult(true, "Saving...");

  const { error } = await sb.from("progress_log").upsert(record, { onConflict: "user_id,log_date" });

  if (error) {
    showSaveResult(false, error.message);
    return;
  }

  // Keep Settings' Current Weight in sync so weight-target achievements
  // and other screens that read it stay accurate, if a weight was logged.
  if (record.weight) {
    await sb.from("user_settings").upsert({ user_id: userId, current_weight: record.weight }, { onConflict: "user_id" });
  }

  showSaveResult(true, "Saved.");
  await loadRecentEntries();

}

async function loadRecentEntries() {

  const listEl = document.getElementById("progressList");
  const userId = await getCurrentUserId();

  const { data, error } = await sb
    .from("progress_log")
    .select("*")
    .eq("user_id", userId)
    .order("log_date", { ascending: false })
    .limit(14);

  if (error) {
    listEl.innerHTML = "<div class='empty-state'>" + escapeHtml(error.message) + "</div>";
    return;
  }

  if (!data || data.length === 0) {
    listEl.innerHTML = "<div class='empty-state'>No progress logged yet.</div>";
    return;
  }

  listEl.innerHTML = data.map(function(row) {

    const parts = [];
    if (row.weight) parts.push(row.weight + " wt");
    if (row.exercise_type) parts.push(row.exercise_type);
    if (row.duration) parts.push(row.duration + " min");
    if (row.distance) parts.push(row.distance + " dist");
    if (row.steps) parts.push(row.steps + " steps");
    if (row.sleep_hours) parts.push(row.sleep_hours + " hrs sleep");
    if (row.gym) parts.push("Gym");
    if (row.water_goal_met) parts.push("Water goal met");

    return "<div class='progress-row'>" +
      "<div>" +
        "<div class='progress-date'>" + row.log_date + "</div>" +
        "<div class='progress-meta'>" + (parts.length ? escapeHtml(parts.join(" &middot; ")) : "No details") + "</div>" +
        (row.notes ? "<div class='progress-meta'>" + escapeHtml(row.notes) + "</div>" : "") +
      "</div>" +
      "<button class='progress-delete' onclick='deleteEntry(" + jsStringLiteral(row.id) + ")'>&times;</button>" +
    "</div>";

  }).join("");

}

async function deleteEntry(id) {
  if (!confirm("Delete this entry?")) return;
  const { error } = await sb.from("progress_log").delete().eq("id", id);
  if (error) { alert("Could not delete: " + error.message); return; }
  await loadRecentEntries();
}

function showSaveResult(ok, message) {
  const box = document.getElementById("saveResultBox");
  box.className = "result-box " + (ok ? "ok" : "error");
  box.textContent = message;
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = String(str);
  return div.innerHTML;
}

</script>

</body>
</html>
